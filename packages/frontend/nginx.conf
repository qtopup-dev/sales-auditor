# aaPanel/OpenLiteSpeed terminates the real client TLS connection and proxies here over
# plain HTTP. This container is NOT the edge — pass through whatever X-Forwarded-Proto the
# edge already set (falls back to $scheme only if it's genuinely absent, e.g. direct access).
# Getting this wrong means express-session (cookie.secure=true in production) silently
# withholds the session cookie and every login appears to succeed but never persists.
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API requests go to the backend container over the docker network.
    # Trailing slash on both proxy_pass and location preserves the /api prefix
    # (matches axios baseURL: '/api' in the frontend and app.use('/api', ...) in Express).
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    # SPA fallback — client-side routing (react-router-dom data router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
